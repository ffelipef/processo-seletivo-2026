name: NovaSphere CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: novasphere_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 🚀 IMPORTANTE: O Sonar precisa do histórico completo do git para analisar o código

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Testes com Cobertura XML
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/novasphere_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-lapes-2026
      run: |
        # 🚀 Geração do relatório XML para o Sonar ler a cobertura
        pytest --cov=src --cov-report=xml tests/

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v3
      continue-on-error: true  # 🚀 IMPORTANTE: Evita que a pipeline quebre se as secrets do Sonar não estiverem configuradas no fork
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Fallback para SonarCloud caso a secret SONAR_HOST_URL esteja vazia
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}