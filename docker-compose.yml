services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: nova_sphere_db
    environment:
      # Agora o Docker Compose puxa direto do .env sem margem para confusão
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    command: [
      "postgres",
      "-c", "listen_addresses=*",
      "-c", "ssl=on",
      "-c", "ssl_cert_file=/var/lib/postgresql/ssl/server.crt",
      "-c", "ssl_key_file=/var/lib/postgresql/ssl/server.key"
    ]
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nova_sphere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile # Ou o caminho do seu Dockerfile do backend
    container_name: nova_sphere_web
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    environment:
      - POSTGRES_USER=novasphere_user
      # ... suas outras variáveis de ambiente ...
    
    # 🚀 ADICIONE ESTE BLOCO EXATAMENTE AQUI:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s      # O Docker vai testar a saúde do backend a cada 10 segundos
      timeout: 5s       # Se o backend demorar mais de 5 segundos para responder, falhou
      retries: 3        # O Docker tenta 3 vezes antes de marcar o contêiner como "Unhealthy"
      start_period: 5s  # Dá 5 segundos de carência para o FastAPI inicializar antes de começar a testar
    
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nova_sphere_frontend
    volumes:
      - ./novasphere-frontend:/app
      - /app/node_modules
      # Para evitar reinstalar node_modules em cada reconstrução, você pode usar um volume
      # Ex: - node_modules_frontend:/app/node_modules
      # e adicionar 'node_modules_frontend:' em 'volumes:' abaixo.
      # Por enquanto, o Docker irá criar um volume anônimo para /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      web:
        condition: service_healthy

  sonar_db:
    image: postgres:16-alpine
    container_name: nova_sphere_sonar_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar_password
      - POSTGRES_DB=sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: nova_sphere_sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar_password
      - SONAR_JDBC_URL=jdbc:postgresql://sonar_db:5432/sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

    depends_on:
      sonar_db:
        condition: service_healthy

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: nova_sphere_sonar_scanner
    volumes:
      - .:/usr/src # Mapeia a raiz do seu projeto para dentro do scanner
    environment:
      - SONAR_HOST_URL=http://sonarqube:9000 # URL interna do Sonar dentro da rede do Docker
      - SONAR_TOKEN=${SONAR_TOKEN} # Token do Sonar, que você deve definir no seu .env
    depends_on:
      - sonarqube # Garante que o scanner só roda se o painel do Sonar estiver de pé
    networks:
      - default # Garante que ele está na mesma rede dos outros contêineres para conseguir enviar os dados

volumes:
  db_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
