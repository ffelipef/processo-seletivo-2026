version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nova_sphere_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novasphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-novasphere_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nova_sphere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: nova_sphere_web
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nova_sphere_frontend
    volumes:
      - ./novasphere-frontend:/app
      # Para evitar reinstalar node_modules em cada reconstrução, você pode usar um volume
      # Ex: - node_modules_frontend:/app/node_modules
      # e adicionar 'node_modules_frontend:' em 'volumes:' abaixo.
      # Por enquanto, o Docker irá criar um volume anônimo para /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
