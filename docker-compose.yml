version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nova_sphere_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novasphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-novasphere_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nova_sphere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile # Ou o caminho do seu Dockerfile do backend
    container_name: nova_sphere_web
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - POSTGRES_USER=novasphere_user
      # ... suas outras variáveis de ambiente ...
    
    # 🚀 ADICIONE ESTE BLOCO EXATAMENTE AQUI:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s      # O Docker vai testar a saúde do backend a cada 10 segundos
      timeout: 5s       # Se o backend demorar mais de 5 segundos para responder, falhou
      retries: 3        # O Docker tenta 3 vezes antes de marcar o contêiner como "Unhealthy"
      start_period: 5s  # Dá 5 segundos de carência para o FastAPI inicializar antes de começar a testar
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nova_sphere_frontend
    volumes:
      - ./novasphere-frontend:/app
      # Para evitar reinstalar node_modules em cada reconstrução, você pode usar um volume
      # Ex: - node_modules_frontend:/app/node_modules
      # e adicionar 'node_modules_frontend:' em 'volumes:' abaixo.
      # Por enquanto, o Docker irá criar um volume anônimo para /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
