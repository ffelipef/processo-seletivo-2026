# Chave única e nome do projeto no SonarQube
sonar.projectKey=novasphere-backend
sonar.projectName=NovaSphere Backend
sonar.projectVersion=1.0

# Caminho para o código-fonte e testes
sonar.sources=src
sonar.tests=tests

# Codificação do código-fonte
sonar.sourceEncoding=UTF-8

# 🚀 O PASSO CRUCIAL: Aponta para o relatório gerado pelo pytest-cov
sonar.python.coverage.reportPaths=coverage.xml